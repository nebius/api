syntax = "proto3";

package nebius.mk8s.v1;

import "buf/validate/validate.proto";
import "google/protobuf/timestamp.proto";
import "nebius/annotations.proto";
import "nebius/common/v1/metadata.proto";
import "nebius/common/v1/operation.proto";
import "nebius/mk8s/v1/cluster.proto";

option go_package = "github.com/nebius/gosdk/proto/nebius/mk8s/v1";
option java_multiple_files = true;
option java_outer_classname = "ClusterServiceProto";
option java_package = "ai.nebius.pub.mk8s.v1";

service ClusterService {
  option (api_service_name) = "mk8s";

  // Returns a specific mk8s cluster by its unique identifier.
  rpc Get(GetClusterRequest) returns (Cluster);

  // Returns a specific mk8s cluster by its unique name.
  rpc GetByName(common.v1.GetByNameRequest) returns (Cluster);

  // Returns a list of all mk8s clusters in the specified project.
  rpc List(ListClustersRequest) returns (ListClustersResponse);

  // Creates a new mk8s cluster.
  rpc Create(CreateClusterRequest) returns (common.v1.Operation);

  // Modifies an existing mk8s cluster.
  rpc Update(UpdateClusterRequest) returns (common.v1.Operation);

  // Deletes an mk8s cluster.
  rpc Delete(DeleteClusterRequest) returns (common.v1.Operation);

  // ListControlPlaneVersions returns all k8s release versions available in Nebius API.
  rpc ListControlPlaneVersions(ListClusterControlPlaneVersionsRequest) returns (ListClusterControlPlaneVersionsResponse);
}

message CreateClusterRequest {
  common.v1.ResourceMetadata metadata = 1 [
    (buf.validate.field) = {
      cel: [
        {
          id: "metadata_name"
          message: "'name' must be 1 to 63 characters long and use only letters, digits, '-', or '_', starting and ending with a letter or digit"
          expression: "size(this.name) >= 1 && size(this.name) <= 63 && this.name.matches('^(([A-Za-z0-9][-A-Za-z0-9_]*)?[A-Za-z0-9])?$')"
        },
        {
          id: "metadata_parent_id"
          message: "'parent_id' must be no more than 63 characters long"
          expression: "size(this.parent_id) <= 63"
        }
      ]
      required: true
    },
    (nid) = {
      parent_resource: ["project"]
    }
  ];

  ClusterSpec spec = 2 [(buf.validate.field).required = true];
}

message GetClusterRequest {
  string id = 1 [
    (buf.validate.field).required = true,
    (nid) = {
      resource: ["mk8scluster"]
    }
  ];

  string resource_version = 2;
}

message ListClustersRequest {
  // ID of the IAM container we are listing the resources in.
  string parent_id = 1 [
    (buf.validate.field).required = true,
    (nid) = {
      resource: ["project"]
    }
  ];

  // Specifies the maximum number of items to return in the response.
  int64 page_size = 2;

  // Token for pagination, allowing the retrieval of the next set of results.
  string page_token = 3;
}

message ListClustersResponse {
  repeated Cluster items = 1;

  string next_page_token = 2;
}

message UpdateClusterRequest {
  // Metadata associated with the instance.
  // Includes ID of the instance to update.
  common.v1.ResourceMetadata metadata = 1 [
    (buf.validate.field).required = true,
    (nid) = {
      parent_resource: ["project"]
    }
  ];

  // Updated specifications for the instance.
  ClusterSpec spec = 2;
}

message DeleteClusterRequest {
  string id = 1 [
    (buf.validate.field).required = true,
    (nid) = {
      resource: ["mk8scluster"]
    }
  ];
}

message ListClusterControlPlaneVersionsRequest {}

message ListClusterControlPlaneVersionsResponse {
  repeated ClusterControlPlaneVersion items = 1;
}

message ClusterControlPlaneVersion {
  // Format of the version includes only MAJOR.MINOR, the same as can be passed to cluster creation API. For example "1.31".
  string version = 1;

  // Restricted shows versions available only for internal Nebius use, mostly those about to get released to public.
  // To use such versions - a feature restricted_k8s_versions should be enabled on a cluster.
  bool restricted = 2;

  // EndOfLife determines when the version will be forced out of use.
  google.protobuf.Timestamp end_of_life = 3;
}
