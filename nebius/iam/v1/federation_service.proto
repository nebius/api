syntax = "proto3";

package nebius.iam.v1;

import "buf/validate/validate.proto";
import "nebius/annotations.proto";
import "nebius/common/v1/metadata.proto";
import "nebius/common/v1/operation.proto";
import "nebius/iam/v1/federation.proto";

option go_package = "github.com/nebius/gosdk/proto/nebius/iam/v1";
option java_multiple_files = true;
option java_outer_classname = "FederationServiceProto";
option java_package = "ai.nebius.pub.iam.v1";

service FederationService {
  option (api_service_name) = "cpl.iam";

  // Creates a federation.
  rpc Create(CreateFederationRequest) returns (common.v1.Operation);

  // Retrieves information about a federation by ID.
  rpc Get(GetFederationRequest) returns (Federation);

  // Retrieves information about a federation by name and parent container.
  rpc GetByName(common.v1.GetByNameRequest) returns (Federation);

  // Lists federations by parent container.
  rpc List(ListFederationsRequest) returns (ListFederationsResponse);

  // Updates a federation.
  rpc Update(UpdateFederationRequest) returns (common.v1.Operation);

  // Activates an existing federation.
  // By default, a newly created federation is in the active state.
  rpc Activate(ActivateFederationRequest) returns (common.v1.Operation);

  // Deactivates an existing federation.
  // When a federation is inactive, all users under it cannot authenticate.
  rpc Deactivate(DeactivateFederationRequest) returns (common.v1.Operation);

  // Deletes a federation. An active federation cannot be deleted and must be deactivated first.
  rpc Delete(DeleteFederationRequest) returns (common.v1.Operation);
}

message CreateFederationRequest {
  // Federation resource metadata.
  common.v1.ResourceMetadata metadata = 1;

  // Federation resource specification.
  FederationSpec spec = 2;
}

message GetFederationRequest {
  // Target federation ID.
  string id = 1 [(buf.validate.field).required = true];
}

message ListFederationsRequest {
  // Parent container ID for the federations.
  string parent_id = 1 [(buf.validate.field).required = true];

  // Maximum number of items to return in the response. Default value: 10.
  int64 page_size = 2;

  // Token for pagination, allowing the retrieval of the next set of results.
  string page_token = 3;

  // Filter expression for narrowing down the results.
  string filter = 4;
}

message ListFederationsResponse {
  // List of federations returned in the response.
  repeated Federation items = 1;

  // Token for pagination, allowing the retrieval of the next set of results.
  string next_page_token = 2;
}

message UpdateFederationRequest {
  // Federation resource metadata.
  common.v1.ResourceMetadata metadata = 1;

  // Federation resource specification.
  FederationSpec spec = 2;

  FederationStatus status = 3 [
    deprecated = true,
    (field_deprecation_details) = {description: "'status' is ignored for update requests."}
  ];
}

message ActivateFederationRequest {
  // Target federation ID.
  string federation_id = 1 [(buf.validate.field).required = true];
}

message DeactivateFederationRequest {
  // Target federation ID.
  string federation_id = 1 [(buf.validate.field).required = true];
}

message DeleteFederationRequest {
  // Target federation ID.
  string id = 1 [(buf.validate.field).required = true];
}
