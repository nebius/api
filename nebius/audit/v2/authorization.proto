syntax = "proto3";

package nebius.audit.v2;

import "nebius/annotations.proto";

option go_package = "github.com/nebius/gosdk/proto/nebius/audit/v2";
option java_multiple_files = true;
option java_outer_classname = "AuthorizationProto";
option java_package = "ai.nebius.pub.audit.v2";

message Authorization {
  // Field is required. We do not use `(buf.validate.field).required = true` here as false value
  // considered as unset (validation violation)
  bool authorized = 1 [
    deprecated = true,
    (field_deprecation_details) = {description: "This flag is unreliable and soon will be removed."}
  ];
}
